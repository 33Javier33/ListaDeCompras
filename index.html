<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LISTA Pro - Smart Sync</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              "primary": "#0057bd",
              "on-surface": "#203044",
              "surface": "#f4f6ff",
              "dark-bg": "#0f172a",
              "dark-card": "#1e293b",
            },
            fontFamily: { "body": ["Plus Jakarta Sans"] },
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s ease; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .checked-item { opacity: 0.4; filter: grayscale(1); transform: scale(0.98); }
        .modal-animate { animation: modalIn 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes modalIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-surface dark:bg-dark-bg text-on-surface dark:text-white min-h-screen">

<!-- MODAL MAESTRO: EDITAR/NUEVO PRODUCTO BASE -->
<div id="main-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-on-surface/60 backdrop-blur-sm">
    <div class="bg-white dark:bg-dark-card w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl modal-animate text-on-surface dark:text-white">
        <h2 id="modal-title" class="text-2xl font-black mb-6">Base de Datos</h2>
        <div class="space-y-4">
            <input id="modal-name" type="text" placeholder="Nombre del producto" class="w-full bg-surface dark:bg-dark-bg border-none rounded-2xl p-4 font-bold focus:ring-2 focus:ring-primary text-on-surface dark:text-white">
            <input id="modal-price" type="number" placeholder="Precio sugerido" class="w-full bg-surface dark:bg-dark-bg border-none rounded-2xl p-4 font-bold focus:ring-2 focus:ring-primary text-on-surface dark:text-white">
        </div>
        <div class="grid grid-cols-1 gap-3 mt-8">
            <button id="modal-save-btn" class="w-full py-4 rounded-2xl font-black text-white bg-primary shadow-lg shadow-primary/30 active:scale-95 transition-all">Guardar</button>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="closeModal('main-modal')" class="py-4 rounded-2xl font-bold text-on-surface/40 bg-surface dark:bg-dark-bg text-xs">Cancelar</button>
                <button id="modal-delete-btn" class="py-4 rounded-2xl font-bold text-red-500 bg-red-500/10 text-xs">Eliminar de Base</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL CONFIGURACIONES -->
<div id="settings-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-on-surface/60 backdrop-blur-sm">
    <div class="bg-white dark:bg-dark-card w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl modal-animate text-on-surface dark:text-white">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-black">Ajustes</h2>
            <button onclick="closeModal('settings-modal')" class="text-on-surface/20"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="space-y-3">
            <button onclick="app.shareWhatsApp()" class="w-full flex items-center gap-4 p-4 bg-green-500/10 text-green-600 rounded-2xl font-bold active:scale-95 transition-all text-[10px] uppercase tracking-[0.2em]">
                <span class="material-symbols-outlined text-2xl">share</span> WhatsApp
            </button>
            <button onclick="app.toggleDarkMode()" class="w-full flex items-center gap-4 p-4 bg-primary/10 text-primary rounded-2xl font-bold active:scale-95 transition-all text-[10px] uppercase tracking-[0.2em]">
                <span class="material-symbols-outlined text-2xl">dark_mode</span> Modo Noche
            </button>
            <button onclick="app.exportData()" class="w-full flex items-center gap-4 p-4 bg-surface dark:bg-dark-bg rounded-2xl font-bold active:scale-95 transition-all text-[10px] uppercase tracking-[0.2em]">
                <span class="material-symbols-outlined text-2xl">database</span> Copiar Base
            </button>
            <button onclick="app.factoryReset()" class="w-full flex items-center gap-4 p-4 bg-red-500/10 text-red-500 rounded-2xl font-bold active:scale-95 transition-all text-[10px] uppercase tracking-[0.2em]">
                <span class="material-symbols-outlined text-2xl">delete_forever</span> Reset Total
            </button>
        </div>
    </div>
</div>

<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-dark-bg/80 backdrop-blur-xl border-b border-primary/5">
    <div class="max-w-2xl mx-auto flex items-center justify-between px-6 h-20">
        <h1 class="text-xl font-black tracking-tighter text-primary italic">LISTA PRO</h1>
        <div class="bg-white dark:bg-dark-card px-5 py-2 rounded-2xl shadow-sm border border-primary/5">
            <p id="total-price" class="text-lg font-black text-primary">$0</p>
        </div>
    </div>
</header>

<main class="pt-28 pb-32 px-6 max-w-2xl mx-auto">
    <!-- Entrada Rápida -->
    <section class="mb-10">
        <div class="flex gap-2">
            <div class="bg-white dark:bg-dark-card rounded-2xl p-2 flex items-center gap-3 flex-1 shadow-sm border border-primary/10 focus-within:ring-2 focus-within:ring-primary/40 transition-all">
                <span class="material-symbols-outlined ml-3 text-primary/30">add_shopping_cart</span>
                <input id="quick-add-input" class="bg-transparent border-none focus:ring-0 w-full text-on-surface dark:text-white font-bold placeholder:text-on-surface/20" placeholder="Añadir producto rápido..." type="text" autocomplete="off"/>
            </div>
            <button id="quick-add-btn" class="w-14 h-14 bg-primary text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <span class="material-symbols-outlined">add</span>
            </button>
        </div>
    </section>

    <!-- Base de Productos (Filtro Dinámico) -->
    <section class="mb-10 bg-white dark:bg-dark-card rounded-[2.5rem] p-6 shadow-sm border border-primary/5">
        <div class="flex items-center justify-between mb-4 px-2">
            <p class="text-[10px] font-black text-primary/40 uppercase tracking-widest leading-none">Productos Sugeridos</p>
            <span class="text-[10px] font-black text-primary bg-primary/10 px-2 py-1 rounded-full uppercase" id="base-count">0 en base</span>
        </div>
        <div class="flex gap-2 mb-4">
            <select id="product-dropdown" class="flex-1 bg-surface dark:bg-dark-bg border-none rounded-2xl p-4 font-bold text-on-surface dark:text-white appearance-none cursor-pointer">
                <!-- Se llena por JS filtrando los que ya están en la lista -->
            </select>
            <button id="add-from-base-btn" class="w-14 bg-primary text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <span class="material-symbols-outlined">playlist_add</span>
            </button>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="openModal('edit')" class="py-3 bg-surface dark:bg-dark-bg rounded-xl text-[10px] font-black uppercase tracking-widest text-primary hover:bg-primary hover:text-white transition-all">Modificar</button>
            <button onclick="openModal('new')" class="py-3 bg-surface dark:bg-dark-bg rounded-xl text-[10px] font-black uppercase tracking-widest text-primary hover:bg-primary hover:text-white transition-all">Nuevo</button>
        </div>
    </section>

    <!-- Lista Actual -->
    <section id="shopping-list" class="space-y-4">
        <!-- Dinámico -->
    </section>
</main>

<!-- Nav Inferior -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-24 bg-white/90 dark:bg-dark-card/90 backdrop-blur-2xl border-t border-primary/5 z-50">
    <div class="flex flex-col items-center text-primary">
        <span class="material-symbols-outlined text-3xl">format_list_bulleted</span>
    </div>
    <button id="clear-list-btn" class="w-16 h-16 bg-primary rounded-[2rem] flex items-center justify-center text-white shadow-2xl -translate-y-6 active:scale-75 transition-all">
        <span class="material-symbols-outlined text-3xl">delete_sweep</span>
    </button>
    <button onclick="openSettings()" class="flex flex-col items-center text-on-surface/20 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-3xl">settings</span>
    </button>
</nav>

<script>
const app = {
    products: JSON.parse(localStorage.getItem('v8_list')) || [],
    base: JSON.parse(localStorage.getItem('v8_base')) || [
        { name: 'Leche Colun', price: 1250 },
        { name: 'Huevos 12u', price: 3400 },
        { name: 'Pan Molde', price: 2100 },
        { name: 'Mantequilla', price: 1800 }
    ],
    currentEditIdx: null,

    init() {
        this.renderAll();
        this.setupEvents();
        if(localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');
    },

    setupEvents() {
        const input = document.getElementById('quick-add-input');
        const btn = document.getElementById('quick-add-btn');

        btn.onclick = () => this.addItemFromInput();
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.addItemFromInput();
            }
        });
    },

    addItemFromInput() {
        const input = document.getElementById('quick-add-input');
        const val = input.value.trim();
        if (val) {
            // No agregamos si ya existe con el mismo nombre
            if(!this.products.some(p => p.name.toLowerCase() === val.toLowerCase())){
                this.products.unshift({ name: val, price: 0, checked: false });
            }
            input.value = '';
            this.renderAll();
            input.focus();
        }
    },

    renderAll() {
        this.renderShoppingList();
        this.renderDropdown();
        this.save();
    },

    renderShoppingList() {
        const container = document.getElementById('shopping-list');
        container.innerHTML = '';
        let total = 0;

        this.products.forEach((item, i) => {
            if(item.checked) total += item.price;
            const div = document.createElement('div');
            div.className = `bg-white dark:bg-dark-card rounded-[2rem] p-5 shadow-sm border border-primary/5 flex items-center justify-between transition-all ${item.checked ? 'checked-item' : ''}`;
            div.innerHTML = `
                <div class="flex items-center gap-5 flex-1">
                    <button onclick="app.toggleCheck(${i})" class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${item.checked ? 'bg-primary text-white' : 'bg-surface dark:bg-dark-bg text-primary'}">
                        <span class="material-symbols-outlined">${item.checked ? 'check' : 'add'}</span>
                    </button>
                    <div class="flex-1">
                        <h3 class="font-black text-sm">${item.name}</h3>
                        <div class="flex items-center text-[10px] font-black text-primary/40 uppercase">
                            $ <input type="number" value="${item.price}" onchange="app.updatePrice(${i}, this.value)" class="bg-transparent border-none p-0 focus:ring-0 text-xs font-black w-20 ml-1">
                        </div>
                    </div>
                </div>
                <button onclick="app.removeItem(${i})" class="text-on-surface/10 hover:text-red-500 transition-colors"><span class="material-symbols-outlined">close</span></button>
            `;
            container.appendChild(div);
        });
        document.getElementById('total-price').textContent = new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', maximumFractionDigits: 0 }).format(total);
    },

    // --- LÓGICA DE FILTRO SOLICITADA ---
    renderDropdown() {
        const dropdown = document.getElementById('product-dropdown');
        dropdown.innerHTML = '';
        
        // Filtramos: Solo mostrar items de la base que NO estén en la lista de productos actual
        const availableItems = this.base.filter(baseItem => 
            !this.products.some(prodItem => prodItem.name.toLowerCase() === baseItem.name.toLowerCase())
        );

        if (availableItems.length === 0) {
            dropdown.innerHTML = '<option value="" disabled selected>No hay más items en base...</option>';
        } else {
            dropdown.innerHTML = '<option value="" disabled selected>Selecciona para añadir...</option>';
            availableItems.sort((a,b) => a.name.localeCompare(b.name)).forEach((item) => {
                // Buscamos el índice original en la base completa para poder añadirlo correctamente
                const originalIndex = this.base.findIndex(b => b.name === item.name);
                const opt = document.createElement('option');
                opt.value = originalIndex;
                opt.textContent = `${item.name} ($${item.price})`;
                dropdown.appendChild(opt);
            });
        }
        document.getElementById('base-count').textContent = `${availableItems.length} disponibles`;
    },

    save() {
        localStorage.setItem('v8_list', JSON.stringify(this.products));
        localStorage.setItem('v8_base', JSON.stringify(this.base));
    },

    toggleCheck(i) { this.products[i].checked = !this.products[i].checked; this.renderAll(); },
    updatePrice(i, val) { this.products[i].price = parseInt(val) || 0; this.renderAll(); },
    
    removeItem(i) { 
        this.products.splice(i, 1); 
        this.renderAll(); // Al remover de la lista, volverá a aparecer en el dropdown automáticamente
    },

    // AJUSTES
    toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('darkMode', isDark);
    },

    shareWhatsApp() {
        let text = "🛒 *LISTA DE COMPRAS* 🛒\n\n";
        this.products.forEach(p => text += `${p.checked ? '✅' : '⬜'} *${p.name}* - $${p.price}\n`);
        text += `\n*TOTAL: ${document.getElementById('total-price').textContent}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    },

    exportData() {
        const data = JSON.stringify(this.base);
        navigator.clipboard.writeText(data);
        alert("Base copiada al portapapeles.");
    },

    factoryReset() {
        if(confirm("¿Resetear App?")) { localStorage.clear(); location.reload(); }
    }
};

// MODALES
function openModal(mode) {
    const modal = document.getElementById('main-modal');
    const nameInp = document.getElementById('modal-name');
    const priceInp = document.getElementById('modal-price');
    const delBtn = document.getElementById('modal-delete-btn');
    
    if(mode === 'edit') {
        const idx = document.getElementById('product-dropdown').value;
        if(idx === "" || idx === null) return alert("Selecciona un producto de la base disponible");
        app.currentEditIdx = idx;
        nameInp.value = app.base[idx].name;
        priceInp.value = app.base[idx].price;
        delBtn.classList.remove('hidden');
    } else {
        app.currentEditIdx = null;
        nameInp.value = ""; priceInp.value = "";
        delBtn.classList.add('hidden');
    }
    modal.classList.remove('hidden');
}

function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

document.getElementById('modal-save-btn').onclick = () => {
    const n = document.getElementById('modal-name').value;
    const p = parseInt(document.getElementById('modal-price').value) || 0;
    if(n) {
        if(app.currentEditIdx !== null) app.base[app.currentEditIdx] = { name: n, price: p };
        else app.base.push({ name: n, price: p });
        app.renderAll();
        closeModal('main-modal');
    }
};

document.getElementById('modal-delete-btn').onclick = () => {
    app.base.splice(app.currentEditIdx, 1);
    app.renderAll();
    closeModal('main-modal');
};

document.getElementById('add-from-base-btn').onclick = () => {
    const idx = document.getElementById('product-dropdown').value;
    if(idx !== "" && idx !== null) {
        app.products.unshift({ ...app.base[idx], checked: false });
        app.renderAll(); // Esto filtrará el dropdown automáticamente
    }
};

document.getElementById('clear-list-btn').onclick = () => {
    if(confirm("¿Vaciar lista actual?")) { app.products = []; app.renderAll(); }
};

app.init();
</script>
</body>
</html>
